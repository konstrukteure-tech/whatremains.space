<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What Remains – Archiv</title>
  <style>
    :root {
      --bg: #050913;
      --text: #f1eee8;
      --muted: rgba(241, 238, 232, 0.76);
      --line: rgba(255,255,255,0.10);
      --card: rgba(8, 14, 24, 0.64);
      --gold: #c39a5b;
      --gold-text: #fff9ef;
      --max: 1180px;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      background:
        linear-gradient(90deg, rgba(4,8,15,0.82) 0%, rgba(4,8,15,0.34) 36%, rgba(4,8,15,0.70) 100%),
        url("hero-room.png") center center / cover no-repeat fixed;
    }

    a { color: inherit; text-decoration: none; }

    .topbar {
      padding: 28px 36px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-size: 0.98rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(241, 238, 232, 0.92);
    }

    .shell {
      width: min(var(--max), calc(100% - 72px));
      margin: 0 auto;
      padding: 42px 0 60px;
    }

    .archive-shell {
      display: grid;
      gap: 24px;
    }

    .archive-head,
    .archive-card,
    .empty-state {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 28px;
      backdrop-filter: blur(8px);
    }

    .archive-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 22px;
    }

    .eyebrow {
      font-size: 0.84rem;
      text-transform: uppercase;
      letter-spacing: 0.10em;
      color: rgba(241,238,232,0.56);
      margin-bottom: 10px;
    }

    h1, h2 {
      margin: 0 0 12px;
      font-weight: 400;
      line-height: 1.06;
      letter-spacing: -0.02em;
    }

    h1 { font-size: clamp(2.2rem, 4vw, 3.3rem); }
    h2 { font-size: clamp(1.5rem, 2.8vw, 2rem); }

    .archive-meta,
    .archive-copy {
      color: var(--muted);
      margin: 0;
      line-height: 1.4;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-top: 20px;
    }

    .field-label {
      color: rgba(241,238,232,0.92);
      font-size: 0.96rem;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.18);
      color: var(--text);
      padding: 14px;
      font: inherit;
      resize: vertical;
      outline: none;
    }

    .actions {
      display: flex;
      gap: 14px;
      margin-top: 18px;
    }

    .btn {
      min-height: 52px;
      padding: 0 24px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid transparent;
      font-size: 1rem;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--gold);
      color: var(--gold-text);
    }

    @media (max-width: 900px) {
      .archive-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">Was bleibt.</div>
    <a href="start.html">Schließen</a>
  </div>

  <main class="shell" data-archive-root></main>

  <script type="module" src="./app.js"></script>
</body>
</html>
